# Gitleaks configuration for godot-e2e
# https://github.com/gitleaks-io/gitleaks
#
# The CI "Secret scan" job (.github/workflows/ci.yml) runs gitleaks with this
# configuration via the GITLEAKS_CONFIG environment variable.

title = "godot-e2e gitleaks config"

[extend]
# Use the default gitleaks rules as baseline
useDefault = true

[allowlist]
description = "Global allowlist"
paths = [
    '''docs/internal/''',
    '''\.pytest_cache/''',
    '''__pycache__/''',
    '''\.godot/''',
    '''dist/''',
    '''site/''',
]
