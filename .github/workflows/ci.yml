name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid PR pushes) to save CI
# minutes. Runs on main are kept distinct per-commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install -e ".[lint]"

      - name: Compile all sources (syntax check)
        run: python -m compileall -q python/godot_e2e

      - name: Run ruff
        run: ruff check python/

  build-check:
    name: Build & package check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Upload built distribution
        uses: actions/upload-artifact@v4
        with:
          name: dist-check
          path: dist/

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks scans full history on push

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb wget unzip

      - name: Download Godot 4.5 stable
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip
          unzip Godot_v4.5-stable_linux.x86_64.zip
          chmod +x Godot_v4.5-stable_linux.x86_64

      - name: Install Python package
        run: pip install -e ".[dev]" && pip install pytest-timeout

      - name: Verify Godot binary
        run: xvfb-run -a ./Godot_v4.5-stable_linux.x86_64 --version

      - name: Run tests
        run: |
          GODOT_PATH=./Godot_v4.5-stable_linux.x86_64 xvfb-run -a python -m pytest tests/ -v --timeout=60

      - name: Run example tests (platformer)
        run: |
          GODOT_PATH=./Godot_v4.5-stable_linux.x86_64 xvfb-run -a godot-e2e examples/platformer/tests/e2e/ -v --timeout=60

      - name: Run example tests (minimal)
        run: |
          GODOT_PATH=./Godot_v4.5-stable_linux.x86_64 xvfb-run -a godot-e2e examples/minimal/tests/e2e/ -v --timeout=60

      - name: Run example tests (ui_testing)
        run: |
          GODOT_PATH=./Godot_v4.5-stable_linux.x86_64 xvfb-run -a godot-e2e examples/ui_testing/tests/e2e/ -v --timeout=60

      - name: Upload test output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-linux
          path: test_output/
          if-no-files-found: ignore

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download Godot 4.5 stable
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot-builds/releases/download/4.5-stable/Godot_v4.5-stable_win64.exe.zip" -OutFile godot.zip
          Expand-Archive godot.zip -DestinationPath .

      - name: Install Python package
        run: pip install -e ".[dev]" && pip install pytest-timeout

      - name: Run tests
        shell: pwsh
        run: |
          $env:GODOT_PATH = "Godot_v4.5-stable_win64.exe"
          python -m pytest tests/ -v --timeout=60

      - name: Run example tests (platformer)
        shell: pwsh
        run: |
          $env:GODOT_PATH = "Godot_v4.5-stable_win64.exe"
          godot-e2e examples/platformer/tests/e2e/ -v --timeout=60

      - name: Run example tests (minimal)
        shell: pwsh
        run: |
          $env:GODOT_PATH = "Godot_v4.5-stable_win64.exe"
          godot-e2e examples/minimal/tests/e2e/ -v --timeout=60

      - name: Run example tests (ui_testing)
        shell: pwsh
        run: |
          $env:GODOT_PATH = "Godot_v4.5-stable_win64.exe"
          godot-e2e examples/ui_testing/tests/e2e/ -v --timeout=60

      - name: Upload test output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-windows
          path: test_output/
          if-no-files-found: ignore
